<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Der Mitgliederbereich des Kulturverein Wölpinghausen ist in Vorbereitung.">
  <title>Mitgliederbereich – Kulturverein Wölpinghausen</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/logo-kulturverein.png" type="image/png">
</head>
<body class="auth-page">
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <img src="images/logo-kulturverein.png" alt="Logo Kulturverein Wölpinghausen" class="logo-img header__logo-img" width="52" height="52">
        <span class="header__logo-text">
          <span class="header__logo-name">Kulturverein</span>
          <span class="header__logo-place">Wölpinghausen</span>
        </span>
      </a>
      <a href="index.html" class="header__login">Zur Webseite</a>
    </div>
  </header>
  <main class="auth-main">
    <div class="auth-card">
      <h1 class="auth-card__title">Mitgliederbereich</h1>
      <p class="auth-card__subtitle">Interne Informationen, Dokumente, Termine und Helfer-Einsätze findest du im Mitgliederbereich. Ein separates Login folgt später.</p>
      <div class="form-actions" style="margin-top:1.5rem;">
        <a href="mitgliederbereich/" class="btn btn--primary">Zum Mitgliederbereich</a>
        <a href="eventkalender.html" class="btn btn--outline" style="margin-top:0.75rem;color:var(--color-bordeaux);border-color:var(--color-bordeaux);">Zum Eventkalender</a>
      </div>
      <p class="form-footer">Fragen? <a href="kontakt.html">Kontakt aufnehmen</a></p>
    </div>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
