<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie – Kulturverein Wölpinghausen</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/logo-kulturverein.png" type="image/png">
</head>
<body data-page="galerie">
  <div id="site-header"></div>
  <header class="page-hero page-hero--compact"><div class="container"><p class="page-hero__label">Vereinsleben</p><h1 class="page-hero__title">Galerie</h1><p class="page-hero__text">Klick auf ein Bild öffnet die Lightbox. Mehr Aktuelles auch auf Instagram.</p></div></header>
  <main class="page-content section--white">
    <div class="container">
      <div class="gallery-grid" data-lightbox style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr));">
        <div class="gallery-grid__item"><img src="images/hero-gruppe.jpg" alt="Gemeinsam am Tisch" loading="lazy"></div>
        <div class="gallery-grid__item"><img src="images/bier.jpg" alt="Vereinsabend" loading="lazy"></div>
        <div class="gallery-grid__item"><img src="images/leipzig-rathaus.jpg" alt="Ausflug Leipzig" loading="lazy"></div>
        <div class="gallery-grid__item"><img src="images/biergarten.jpg" alt="Unterwegs" loading="lazy"></div>
        <div class="gallery-grid__item"><img src="images/goethe-denkmal.jpg" alt="Kulturausflug" loading="lazy"></div>
        <div class="gallery-grid__item"><img src="images/leipzig-nacht.jpg" alt="Abend in der Stadt" loading="lazy"></div>
        <div class="gallery-grid__item"><img src="images/woodcutter.jpg" alt="Schützenfest" loading="lazy"></div>
        <div class="gallery-grid__item"><img src="images/woodcutter-banner.jpg" alt="Vereinsleben" loading="lazy"></div>
      </div>
      <div class="section__cta"><a href="#" data-instagram-link class="btn btn--primary">Mehr auf Instagram</a></div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="js/script.js"></script>
</body>
</html>
