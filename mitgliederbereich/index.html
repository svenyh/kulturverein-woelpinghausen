<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/">
  <meta name="description" content="Mitgliederbereich des Kulturverein Wölpinghausen – Aktuelles, Dokumente, Termine und Helfer gesucht.">
  <title>Mitgliederbereich – Kulturverein Wölpinghausen</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/members.css">
  <link rel="icon" href="images/logo-kulturverein.png" type="image/png">
</head>
<body data-page="mitgliederbereich">
  <div id="site-header" class="site-header"></div>

  <header class="page-hero page-hero--compact">
    <div class="container">
      <p class="page-hero__label">Mitglieder</p>
      <h1 class="page-hero__title">Mitgliederbereich</h1>
      <p class="page-hero__text">Aktuelles, Dokumente, Termine und Helfer gesucht – gepflegt vom Kulturverein Wölpinghausen.</p>
    </div>
  </header>

  <main class="page-content section--cream">
    <div class="container members-display">
      <section class="members-section" aria-labelledby="members-news-title">
        <div class="members-section__header">
          <h2 id="members-news-title" class="members-section__title"><span class="members-section__icon" aria-hidden="true">📢</span> Aktuelles</h2>
        </div>
        <p id="members-news-status" class="members-status" role="status">Inhalte werden geladen …</p>
        <div id="members-news-list" class="members-grid" hidden></div>
      </section>

      <section class="members-section" aria-labelledby="members-documents-title">
        <div class="members-section__header">
          <h2 id="members-documents-title" class="members-section__title"><span class="members-section__icon" aria-hidden="true">📄</span> Dokumente</h2>
        </div>
        <p id="members-documents-status" class="members-status" role="status">Inhalte werden geladen …</p>
        <div id="members-documents-list" class="members-grid" hidden></div>
      </section>

      <section class="members-section" aria-labelledby="members-events-title">
        <div class="members-section__header">
          <h2 id="members-events-title" class="members-section__title"><span class="members-section__icon" aria-hidden="true">📅</span> Termine</h2>
        </div>
        <p id="members-events-status" class="members-status" role="status">Inhalte werden geladen …</p>
        <div id="members-events-list" class="members-grid" hidden></div>
      </section>

      <section class="members-section" aria-labelledby="members-helpers-title">
        <div class="members-section__header">
          <h2 id="members-helpers-title" class="members-section__title"><span class="members-section__icon" aria-hidden="true">🤝</span> Helfer gesucht</h2>
        </div>
        <p id="members-helpers-status" class="members-status" role="status">Inhalte werden geladen …</p>
        <div id="members-helpers-list" class="members-grid" hidden></div>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="js/script.js"></script>
  <script src="js/members.js"></script>
</body>
</html>
