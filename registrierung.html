<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrierung – Kulturverein Wölpinghausen</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/logo-kulturverein.png" type="image/png">
</head>
<body class="auth-page">
  <header class="header"><div class="container header__inner"><a href="index.html" class="header__logo"><img src="images/logo-kulturverein.png" alt="" width="44" height="44"></a><a href="login.html" class="header__login">Zum Login</a></div></header>
  <main class="auth-main">
    <div class="auth-card auth-card--wide">
      <h1 class="auth-card__title">Mitgliedsanfrage / Registrierung</h1>
      <p class="auth-card__subtitle">Die digitale Freischaltung durch den Vorstand folgt in einer späteren Version.</p>
      <form data-form-notice="reg-notice" data-success-message="Deine Anfrage wurde entgegengenommen. Der Vorstand prüft sie und meldet sich bei dir.">
        <div class="form-row form-row--2">
          <div class="form-group"><label for="first">Vorname</label><input type="text" id="first" required></div>
          <div class="form-group"><label for="last">Nachname</label><input type="text" id="last" required></div>
        </div>
        <div class="form-group"><label for="email">E-Mail</label><input type="email" id="email" required></div>
        <div class="form-group"><label for="phone">Telefon</label><input type="tel" id="phone"></div>
        <div class="form-group"><label for="password">Passwort wählen</label><input type="password" id="password" minlength="8" required></div>
        <div class="form-actions"><button type="submit" class="btn btn--primary">Anfrage absenden</button></div>
        <div class="form-notice" id="reg-notice" hidden></div>
      </form>
      <p class="form-footer">Bereits Mitglied? <a href="login.html">Zum Login</a></p>
    </div>
  </main>
  <script src="js/script.js"></script>
</body>
</html>
